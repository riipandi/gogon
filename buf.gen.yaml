# yaml-language-server: $schema=https://json.schemastore.org/buf.gen.json

# This file defines the generation configuration for buf.
# For detailed information, see https://buf.build/docs/configuration/v2/buf-gen-yaml

version: v2

clean: true

inputs:
  - directory: .
    paths:
      - api

plugins:
  - local: [go, tool, protoc-gen-go]
    out: specs
    opt: paths=source_relative

  - local: [go, tool, protoc-gen-connect-go]
    out: specs
    opt:
      - paths=source_relative
      - simple

  - local: protoc-gen-es
    out: app/generated
    include_imports: true
    strategy: directory
    opt:
      - target=ts
      - import_extension=ts
      - ts_nocheck=false
