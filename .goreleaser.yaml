# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: myapp
report_sizes: true
dist: ./release

metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'

before:
  hooks:
    - go mod tidy
    - pnpm install --ignore-scripts --frozen-lockfile
    - swag init --output ./api -d cmd,internal,modules,pkg -g myapp/main.go --quiet
    - swag fmt --dir ./api

env:
  - CGO_ENABLED=0
  - GOEXPERIMENT=jsonv2,greenteagc

builds:
  - id: build_noncgo
    main: ./cmd/myapp
    binary: '{{.Os}}_{{.Arch}}/{{.ProjectName}}'
    no_main_check: true
    no_unique_dist_dir: true
    goos: ['darwin', 'linux', 'windows']
    goarch: ['amd64', 'arm64']
    buildmode: pie
    tags:
      - prod
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -w -s -extldflags '-static'
      - -X 'myapp/internal.Version={{.Tag}}'
      - -X 'myapp/internal.BuildHash={{.ShortCommit}}'
      - -X 'myapp/internal.BuildDate={{.Date}}'

archives:
  - formats: [tar.gz]
    ids: [build_noncgo]
    name_template: 'build-{{.ShortCommit}}/{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}'
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: 'v{{ incpatch .Version }}'

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^examples:'
      - '^docs:'
      - '^test:'

release:
  prerelease: auto
  mode: prepend
  draft: true

