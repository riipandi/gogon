syntax = "proto3";

package api.v1;

option go_package = "gogon/specs/api/v1;gogonv1";

// GreetRequest represents a request to greet someone by name.
message GreetRequest {
  // The name of the person to greet.
  string name = 1;
}

// GreetResponse represents the response containing a greeting message.
message GreetResponse {
  // The greeting message returned to the client.
  string greeting = 1;
}

// GreetService provides a simple greeting RPC service.
service GreetService {
  // Greet sends a greeting to the specified name.
  rpc Greet(GreetRequest) returns (GreetResponse) {}
}
